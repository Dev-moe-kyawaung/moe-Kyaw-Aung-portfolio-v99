name: Deploy Flutter Web + GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web --release --wasm
      - uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          folder: build/web
          branch: gh-pages
          clean: true
